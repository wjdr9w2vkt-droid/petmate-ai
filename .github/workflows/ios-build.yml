name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create Capacitor webDir
        run: |
          mkdir -p out
          cat > out/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=https://petmate-nomjtnjor-wjdr9w2vkt-droids-projects.vercel.app">
          </head><body></body></html>
          HTML

      - name: Sync iOS
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PetMate-iOS
          path: ios/App/build/App.xcarchive
