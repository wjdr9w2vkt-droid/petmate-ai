name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create Capacitor webDir
        run: |
          mkdir -p out
          cat > out/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=https://petmate-nomjtnjor-wjdr9w2vkt-droids-projects.vercel.app">
          </head><body></body></html>
          HTML

      - name: Sync iOS
        run: npx cap sync ios

      - name: Build & Sign Archive
        run: |
          AUTH_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$AUTH_KEY_DIR"
          echo "${{ secrets.APPSTORE_KEY_P8 }}" > "$AUTH_KEY_DIR/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=GZ5765LM2A \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyPath "$AUTH_KEY_DIR/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"

      - name: Export IPA
        run: |
          cat > export.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>method</key><string>app-store-connect</string>
          <key>teamID</key><string>GZ5765LM2A</string>
          </dict></plist>
          PLIST
          AUTH_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportPath ios/App/build \
            -exportOptionsPlist export.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyPath "$AUTH_KEY_DIR/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetMate-IPA
          path: ios/App/build/PetMate.ipa

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f ios/App/build/PetMate.ipa \
            -t ios \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }} \
            --verbose
