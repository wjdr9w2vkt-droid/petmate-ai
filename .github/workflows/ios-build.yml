name: Build & Upload iOS to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create Capacitor webDir
        run: |
          mkdir -p out
          cat > out/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=https://petmate-nomjtnjor-wjdr9w2vkt-droids-projects.vercel.app">
          </head><body></body></html>
          HTML

      - name: Sync iOS
        run: npx cap sync ios

      - name: Write App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_KEY_P8 }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          AUTH_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"
          echo "AUTH_KEY_PATH=$AUTH_KEY_PATH" >> $GITHUB_ENV
          mkdir -p ios/App/build
          cat > ios/App/build/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
          </dict>
          </plist>
          PLIST

      - name: Build & Archive
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyPath ${{ env.AUTH_KEY_PATH }}

      - name: Export IPA
        run: |
          cd ios/App/build
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportPath . \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyPath ${{ env.AUTH_KEY_PATH }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetMate-IPA
          path: ios/App/build/PetMate.ipa

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f ios/App/build/PetMate.ipa \
            -t ios \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }} \
            --verbose
