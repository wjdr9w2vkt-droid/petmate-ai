name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create Capacitor webDir
        run: |
          mkdir -p out
          cat > out/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=https://petmate-nomjtnjor-wjdr9w2vkt-droids-projects.vercel.app">
          </head><body></body></html>
          HTML

      - name: Sync iOS
        run: npx cap sync ios

      - name: Build iOS Archive
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=GZ5765LM2A \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Inject Team ID into Archive
        run: |
          INFO_PLIST="ios/App/build/App.xcarchive/Info.plist"
          echo "=== Before ==="
          /usr/libexec/PlistBuddy -c "Print" "$INFO_PLIST" 2>&1 | head -3
          /usr/libexec/PlistBuddy -c "Delete :ApplicationProperties" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:Team string GZ5765LM2A" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:SigningIdentity string Apple Development" "$INFO_PLIST"
          echo "=== After ==="
          /usr/libexec/PlistBuddy -c "Print :ApplicationProperties" "$INFO_PLIST"

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: PetMate-xcarchive
          path: ios/App/build/App.xcarchive
