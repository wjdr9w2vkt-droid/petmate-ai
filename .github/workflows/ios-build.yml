name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create Capacitor webDir
        run: |
          mkdir -p out
          cat > out/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=https://petmate-nomjtnjor-wjdr9w2vkt-droids-projects.vercel.app">
          </head><body></body></html>
          HTML

      - name: Sync iOS
        run: npx cap sync ios

      - name: Build iOS Archive
        run: |
          AUTH_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$AUTH_KEY_DIR"
          echo "${{ secrets.APPSTORE_KEY_P8 }}" > "$AUTH_KEY_DIR/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"
          AUTH_KEY_PATH="$AUTH_KEY_DIR/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"

          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=GZ5765LM2A \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyPath "$AUTH_KEY_PATH"

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: PetMate-xcarchive
          path: ios/App/build/App.xcarchive
